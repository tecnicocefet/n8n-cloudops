---
- name: Setup Docker and environment for n8n + PostgreSQL
  hosts: all
  become: true
  gather_facts: true

  vars:
    postgres_volume: /home/ubuntu/postgres-data

  tasks:

    - name: Atualizar cache apt
      apt:
        update_cache: yes

    - name: Instalar dependências
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Criar diretório de keyrings
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Adicionar chave GPG do Docker
      shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
        gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Adicionar repositório Docker
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Instalar Docker + plugins
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Garantir Docker rodando
      service:
        name: docker
        state: started
        enabled: true

    - name: Adicionar usuário ubuntu ao grupo docker
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Criar diretório PostgreSQL
      file:
        path: "{{ postgres_volume }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'