---
- name: Start n8n + PostgreSQL containers
  hosts: all
  become: true

  vars:
    n8n_port: 5678
    postgres_port: 5432
    postgres_user: n8n
    postgres_password: n8npass
    postgres_db: n8ndb
    postgres_volume: /home/ubuntu/postgres-data

  tasks:

    - name: Garantir Docker rodando
      service:
        name: docker
        state: started
        enabled: true

    - name: Esperar Docker responder
      command: docker info
      register: docker_status
      retries: 10
      delay: 5
      until: docker_status.rc == 0

    - name: Verificar docker compose disponível
      command: docker compose version
      register: compose_version

    - name: Mostrar versão do compose
      debug:
        var: compose_version.stdout

    - name: Criar diretório do Postgres
      file:
        path: "{{ postgres_volume }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Criar docker-compose.yml
      copy:
        dest: /home/ubuntu/docker-compose.yml
        content: |
          services:
            postgres:
              image: postgres:15
              restart: always
              environment:
                POSTGRES_USER: "{{ postgres_user }}"
                POSTGRES_PASSWORD: "{{ postgres_password }}"
                POSTGRES_DB: "{{ postgres_db }}"
              volumes:
                - "{{ postgres_volume }}:/var/lib/postgresql/data"
              ports:
                - "{{ postgres_port }}:5432"

            n8n:
              image: n8nio/n8n
              restart: always
              environment:
                DB_TYPE: postgres
                DB_POSTGRESDB_HOST: postgres
                DB_POSTGRESDB_PORT: "{{ postgres_port }}"
                DB_POSTGRESDB_DATABASE: "{{ postgres_db }}"
                DB_POSTGRESDB_USER: "{{ postgres_user }}"
                DB_POSTGRESDB_PASSWORD: "{{ postgres_password }}"
                N8N_PORT: "{{ n8n_port }}"
                GENERIC_TIMEZONE: America/Sao_Paulo
              ports:
                - "{{ n8n_port }}:5678"
              depends_on:
                - postgres

    - name: Subir containers
      command: docker compose up -d
      args:
        chdir: /home/ubuntu
      register: compose_up
      retries: 3
      delay: 5
      until: compose_up.rc == 0

    - name: Mostrar resultado do compose
      debug:
        var: compose_up.stdout_lines

    - name: Esperar n8n responder
      uri:
        url: http://localhost:{{ n8n_port }}
        status_code: 200
      register: n8n_check
      retries: 10
      delay: 5
      until: n8n_check.status == 200

    - name: Verificar containers
      command: docker compose ps
      args:
        chdir: /home/ubuntu
      register: docker_ps

    - name: Mostrar containers rodando
      debug:
        msg: "{{ docker_ps.stdout_lines }}"

    