---
- name: Configurar N8N na EC2 com Nginx e Cloudflare Origin Cert
  hosts: all
  become: true

  vars:
    domain_name: agentezap.xyz
    n8n_port: 5678
    cert_path: /etc/ssl/certs/n8n.crt
    key_path: /etc/ssl/private/n8n.key
    cert_local_path: ./n8n.crt
    key_local_path: ./n8n.key

  tasks:

    # ---------------- NGINX ---------------- #
    - name: Garantir Nginx instalado
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Garantir Nginx rodando
      service:
        name: nginx
        state: started
        enabled: true

    # ---------------- CERTIFICADO ---------------- #
    - name: Copiar certificado Cloudflare para EC2
      copy:
        src: "{{ cert_local_path }}"
        dest: "{{ cert_path }}"
        owner: root
        group: root
        mode: '0644'

    - name: Copiar chave privada Cloudflare para EC2
      copy:
        src: "{{ key_local_path }}"
        dest: "{{ key_path }}"
        owner: root
        group: root
        mode: '0600'

    # ---------------- CONFIG NGINX ---------------- #
    - name: Criar config Nginx para N8N com HTTPS
      copy:
        dest: /etc/nginx/sites-available/n8n
        content: |
          server {
              listen 80;
              server_name {{ domain_name }};
              return 301 https://$host$request_uri;
          }

          server {
              listen 443 ssl http2;
              server_name {{ domain_name }};

              ssl_certificate {{ cert_path }};
              ssl_certificate_key {{ key_path }};

              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_ciphers HIGH:!aNULL:!MD5;

              location / {
                  proxy_pass http://localhost:{{ n8n_port }};
                  proxy_http_version 1.1;

                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;

                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
              }
          }
      notify: Reload Nginx

    - name: Ativar site Nginx
      file:
        src: /etc/nginx/sites-available/n8n
        dest: /etc/nginx/sites-enabled/n8n
        state: link
        force: true

    - name: Remover default
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    # ---------------- REINÍCIO ANTES DO TESTE HTTPS ---------------- #
    - name: Reiniciar Nginx antes do teste HTTPS
      service:
        name: nginx
        state: restarted

    # ---------------- TESTE HTTPS ---------------- #
    - name: Testar HTTPS com 5 tentativas
      uri:
        url: "https://{{ domain_name }}"
        validate_certs: yes
      register: https_check
      retries: 5
      delay: 5
      until: https_check.status == 200
      ignore_errors: yes

    - name: Reiniciar Nginx se HTTPS falhar e mostrar status
      block:
        - name: Reiniciar Nginx após falha
          service:
            name: nginx
            state: restarted

        - name: Testar HTTPS novamente após reinício
          uri:
            url: "https://{{ domain_name }}"
            validate_certs: yes
          register: https_check_final
          retries: 5
          delay: 5
          until: https_check_final.status == 200
          ignore_errors: yes

        - name: Mostrar status final HTTPS
          debug:
            msg: "HTTPS final status: {{ https_check_final.status }}"
      when: https_check.status != 200

    - name: Mostrar status HTTPS inicial se OK
      debug:
        msg: "HTTPS OK: {{ https_check.status }}"
      when: https_check.status == 200

  handlers:
    - name: Reload Nginx
      service:
        name: nginx
        state: restarted