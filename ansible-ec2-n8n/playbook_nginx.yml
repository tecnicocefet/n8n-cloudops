---
- name: Configurar N8N na EC2 com Nginx e Cloudflare Origin Cert
  hosts: all
  become: true

  # Carrega os segredos (Certificado e Chave)
  vars_files:
    - ../vars/secrets.yml

  vars:
    domain_name: agentezap.xyz
    n8n_port: 5678
    cert_path: /etc/ssl/certs/n8n.crt
    key_path: /etc/ssl/private/n8n.key

  tasks:

    - name: Garantir Nginx instalado
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Garantir Nginx rodando
      service:
        name: nginx
        state: started
        enabled: true

    - name: Criar arquivo do certificado na EC2 (do Vault)
      copy:
        content: "{{ vault_cloudflare_cert }}"
        dest: "{{ cert_path }}"
        owner: root
        group: root
        mode: '0644'

    - name: Criar arquivo da chave privada na EC2 (do Vault)
      copy:
        content: "{{ vault_cloudflare_key }}"
        dest: "{{ key_path }}"
        owner: root
        group: root
        mode: '0600'

    - name: Criar config Nginx para N8N
      copy:
        dest: /etc/nginx/sites-available/n8n
        content: |
          server {
              listen 80;
              server_name {{ domain_name }};
              return 301 https://$host$request_uri;
          }

          server {
              listen 443 ssl http2;
              server_name {{ domain_name }};

              ssl_certificate {{ cert_path }};
              ssl_certificate_key {{ key_path }};

              # Otimização de segurança SSL
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_prefer_server_ciphers on;
              ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

              # Aumentar limite de upload (importante para o n8n lidar com arquivos)
              client_max_body_size 50M;

              location / {
                  proxy_pass http://localhost:{{ n8n_port }};
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  
                  # Timeout estendido para execuções longas do n8n
                  proxy_connect_timeout 600;
                  proxy_send_timeout 600;
                  proxy_read_timeout 600;
                  send_timeout 600;
              }
          }
      notify: Reload Nginx

    - name: Ativar site Nginx
      file:
        src: /etc/nginx/sites-available/n8n
        dest: /etc/nginx/sites-enabled/n8n
        state: link
        force: true

    - name: Remover default
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

  handlers:
    - name: Reload Nginx
      service:
        name: nginx
        state: restarted